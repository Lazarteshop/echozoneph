<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN77 Idle Chick PRO</title>

<!-- MONETAG POPUNDER SCRIPT (ILAGAY DITO ANG ORIGINAL CODE MO - WALANG TATANGGALIN SA IBABA) -->
<script>(function(s){s.dataset.zone='10587611',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.screen{display:none;padding:20px}
.active{display:block}
.card{background:#1e293b;border-radius:16px;padding:16px;margin:10px 0}
button{padding:10px;border-radius:8px;border:none;background:#22c55e;color:#fff;font-weight:bold;margin:4px;cursor:pointer}
button:disabled{background:#64748b;cursor:not-allowed}
input{padding:10px;border-radius:8px;border:none;margin:4px 0}
.center{text-align:center}
.energy-bar{height:14px;background:#334155;border-radius:10px;overflow:hidden;margin:10px 0}
.energy-fill{height:100%;background:#22c55e;width:100%}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.popup-content{background:#78350f;padding:20px;border-radius:16px;width:90%;max-width:320px;text-align:center}
.admin-box{background:#1e293b;padding:10px;margin:8px 0;border-radius:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
<h2>Login</h2>
<input id="userInput" placeholder="Username"><br>
<input id="passInput" type="password" placeholder="Password"><br>
<button onclick="loginUser()">Login / Register</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<h2>🐥 PIN77 PRO</h2>
<div class="card center">
<div style="font-size:70px">🐥</div>
<div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div>
<p>Energy: <span id="energyText"></span></p>
<p>Points: <span id="pointsText"></span></p>
<p>Balance: ₱<span id="balanceText"></span></p>
<p id="adCooldown"></p>
<p id="gameCooldown"></p>
<p id="chestCooldown"></p>
</div>

<div class="card">
<button id="watchBtn" onclick="watchAd()">▶️ Watch Ad (+50)</button>
<button id="playBtn" onclick="playGame()">🎮 Play Game (+30)</button>
</div>

<div class="card">
<h3>Withdraw (Min: 1000 pts)</h3>
<input id="withdrawInput" placeholder="Points to withdraw">
<button onclick="withdrawPoints()">Withdraw</button>
<p id="withdrawMsg"></p>
<h4>History</h4>
<div id="historyBox"></div>
</div>

<button onclick="logoutUser()">Logout</button>
</div>

<!-- MINI GAME POPUP (DAGDAG LANG - WALANG TINANGGAL) -->
<div id="miniGamePopup" class="popup">
<div class="popup-content">
<h3>Click the Chick 5 Times!</h3>
<p>Clicks: <span id="miniClicks">0</span>/5</p>
<button onclick="miniClick()" style="font-size:40px">🐥</button><br><br>
<button onclick="closeMiniGame()">Cancel</button>
</div>
</div>

<!-- YOUTUBE MODAL -->
<div id="ytModal" class="popup">
  <div class="popup-content" style="background:#000">
    <h3>Watch Full Video To Earn Reward</h3>
    <div id="ytFrame"></div>
    <p style="font-size:12px;color:#ccc">Reward will be given after video finishes.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
<h2>Admin Dashboard</h2>
<div id="adminUsers"></div>
<button onclick="logoutUser()">Logout</button>
</div>

<script>
// ===== CONFIG =====
const POINT_RATE = 1000;
const MIN_WITHDRAW = 1000;
const TASK_COOLDOWN = 60000;

let currentUser = null;
let cooldownTimer = null;
let users = JSON.parse(localStorage.getItem('pin77_users') || '{}');
let miniCounter = 0;

function $(id){ return document.getElementById(id); }
function save(){ localStorage.setItem('pin77_users', JSON.stringify(users)); }

// ===== LOGIN =====
function loginUser(){
  const uEl = $('userInput');
  const pEl = $('passInput');
  if(!uEl || !pEl) return;

  const u = uEl.value.trim();
  const p = pEl.value.trim();

  if(!u || !p) return alert('Enter credentials');

  if(u === 'admin' && p === 'admin123'){
    showAdmin(); return;
  }

  if(!users[u]){
    users[u] = {
      pass:p,
      points:0,
      balance:0,
      energy:100,
      history:[],
      cooldowns:{ad:0,game:0,chest:0}
    };
  }

  if(users[u].pass !== p) return alert('Wrong password');

  currentUser = u;
  save();
  showGame();
}

function logoutUser(){ location.reload(); }

// ===== SCREEN CONTROL =====
function showGame(){
  $('loginScreen').classList.remove('active');
  $('adminScreen').classList.remove('active');
  $('gameScreen').classList.add('active');
  startCooldownTimer();
  updateUI();
}

function showAdmin(){
  $('loginScreen').classList.remove('active');
  $('gameScreen').classList.remove('active');
  $('adminScreen').classList.add('active');
  loadAdmin();
}

// ===== UI =====
function updateUI(){
  if(!currentUser) return;

  const u = users[currentUser];

  $('pointsText').textContent = u.points;
  $('balanceText').textContent = u.balance.toFixed(2);
  $('energyText').textContent = u.energy;
  $('energyFill').style.width = u.energy + '%';

  $('watchBtn').disabled = u.energy <= 0 || Date.now() < u.cooldowns.ad;
  $('playBtn').disabled = u.energy <= 0 || Date.now() < u.cooldowns.game;

  loadHistory();
}

// ===== WATCH AD (YOUTUBE RANDOM VIDEO REQUIRED TO FINISH) =====
let ytPlayer = null;
let ytUser = null;

const ytVideos = [
  "dQw4w9WgXcQ",
  "9bZkp7q19f0",
  "l482T0yNkeo",
  "3tmd-ClpJxA",
  "fJ9rUzIMcZQ"
];

function watchAd(){
  const u = users[currentUser];
  if(!u || u.energy <= 0) return;
  if(Date.now() < u.cooldowns.ad) return;

  ytUser = currentUser;

  const randomId = ytVideos[Math.floor(Math.random()*ytVideos.length)];

  $('ytModal').style.display = 'flex';

  if(ytPlayer){
    ytPlayer.loadVideoById(randomId);
  }else{
    ytPlayer = new YT.Player('ytFrame',{
      height:'315',
      width:'100%',
      videoId: randomId,
      playerVars:{ autoplay:1, controls:0, disablekb:1, modestbranding:1 },
      events:{
        'onStateChange': onYTStateChange
      }
    });
  }
}

function onYTStateChange(event){
  if(event.data === YT.PlayerState.ENDED){
    giveYTReward();
  }
}

function giveYTReward(){
  if(!ytUser) return;

  const u = users[ytUser];
  if(!u) return;

  $('ytModal').style.display = 'none';

  u.points += 50;
  u.energy = Math.max(0, u.energy - 10);
  u.cooldowns.ad = Date.now() + TASK_COOLDOWN;

  ytUser = null;

  save();
  updateUI();
}

// Load YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

// ===== PLAY GAME (NEED MINI GAME FIRST) =====
function playGame(){
  const u = users[currentUser];
  if(!u || u.energy <= 0) return;
  if(Date.now() < u.cooldowns.game) return;

  miniCounter = 0;
  $('miniClicks').textContent = 0;
  $('miniGamePopup').style.display='flex';
}

function miniClick(){
  miniCounter++;
  $('miniClicks').textContent = miniCounter;

  if(miniCounter >= 5){
    finishMiniGame();
  }
}

function finishMiniGame(){
  const u = users[currentUser];
  $('miniGamePopup').style.display='none';

  u.points += 30;
  u.energy = Math.max(0, u.energy - 10);
  u.cooldowns.game = Date.now() + TASK_COOLDOWN;

  save(); updateUI();
}

function closeMiniGame(){
  $('miniGamePopup').style.display='none';
}

// ===== COOLDOWN TIMER (HINDI TINANGGAL) =====
function startCooldownTimer(){
  if(cooldownTimer) clearInterval(cooldownTimer);

  cooldownTimer = setInterval(()=>{
    if(!currentUser) return;

    const u = users[currentUser];
    const now = Date.now();

    $('adCooldown').textContent = u.cooldowns.ad > now ?
      'Ad cooldown ' + Math.ceil((u.cooldowns.ad-now)/1000)+'s' : '';

    $('gameCooldown').textContent = u.cooldowns.game > now ?
      'Game cooldown ' + Math.ceil((u.cooldowns.game-now)/1000)+'s' : '';

    $('chestCooldown').textContent = u.cooldowns.chest > now ?
      'Chest cooldown ' + Math.ceil((u.cooldowns.chest-now)/1000)+'s' : '';

    updateUI();
  },1000);
}

// ===== CHEST SYSTEM (BUO PA RIN) =====
function openChest(){
  const u = users[currentUser];
  if(!u) return;

  const now = Date.now();
  if(now < u.cooldowns.chest) return;

  const reward = Math.floor(Math.random()*40+20);
  u.points += reward;
  u.cooldowns.chest = now + TASK_COOLDOWN;

  save(); updateUI();
}

// ===== WITHDRAW =====
function withdrawPoints(){
  const amt = parseInt($('withdrawInput')?.value);
  const u = users[currentUser];

  if(!amt || amt < MIN_WITHDRAW)
    return $('withdrawMsg').textContent = 'Minimum withdraw is 1000 points';

  if(amt > u.points)
    return $('withdrawMsg').textContent = 'Not enough points';

  u.points -= amt;
  u.history.push({points:amt,status:'Pending'});

  $('withdrawMsg').textContent = 'Withdrawal pending admin approval';

  save(); updateUI();
}

// ===== HISTORY =====
function loadHistory(){
  const u = users[currentUser];
  const box = $('historyBox');
  if(!box || !u) return;

  box.innerHTML='';

  if(!Array.isArray(u.history)) u.history=[];

  u.history.forEach(h=>{
    box.innerHTML += `<div>${h.points} pts - ${h.status}</div>`;
  });
}

// ===== ADMIN (BUO - MAY ADD ENERGY AT APPROVE) =====
function loadAdmin(){
  const box = $('adminUsers');
  box.innerHTML='';

  for(let username in users){
    const u = users[username];

    box.innerHTML += `
    <div class="admin-box">
      <strong>${username}</strong><br>
      Points: ${u.points} | Energy: ${u.energy}<br>
      <input placeholder="Add Energy" id="energy_${username}">
      <button onclick="addEnergy('${username}')">Add Energy</button>
      <h4>Withdraw Requests</h4>
      ${u.history.map((h,i)=> h.status==='Pending' ?
        `<div>${h.points} pts 
          <button onclick="approveWithdraw('${username}',${i})">Approve</button>
        </div>`:'' ).join('')}
    </div>
    `;
  }
}

function addEnergy(username){
  const amt = parseInt($('energy_'+username)?.value);
  if(!amt) return;
  users[username].energy += amt;
  save(); loadAdmin();
}

function approveWithdraw(username,index){
  const request = users[username].history[index];
  if(!request) return;

  request.status = 'Approved';
  const php = request.points / POINT_RATE;
  users[username].balance += php;

  save(); loadAdmin();
}
</script>
</body>
</html>
