const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser=null;
let users={};

function $(id){return document.getElementById(id)}

async function loadUsers(){
  const { data, error } = await supabase.from('pin77_users').select('*');
  if(error){console.error(error); return;}
  users={};
  data.forEach(u=>{ users[u.username]=u.data; });
}

async function saveUser(username){
  if(!users[username]) return;
  const { error } = await supabase.from('pin77_users').upsert({ username: username, data: users[username] });
  if(error) console.error(error);
}

async function saveAndUpdate(username){
  await saveUser(username);
  if(currentUser==='admin'){ await loadUsers(); loadAdmin(); }
}

async function loginUser(){
  const u=$('userInput').value.trim();
  const p=$('passInput').value.trim();
  if(!u||!p) return alert('Enter credentials');

  if(u==='admin' && p==='admin123'){ currentUser='admin'; await showAdmin(); return; }

  await loadUsers();

  if(!users[u]){
    users[u]={pass:p, points:0, balance:0, energy:500, dailyUsed:0, history:[], gcash:'', banned:false};
    await saveUser(u);
  }

  if(users[u].pass!==p) return alert('Wrong password');
  if(users[u].banned) return alert('Your account is banned from earning.');

  alert('User login success');
}

async function showAdmin(){
  $('loginScreen').classList.remove('active');
  $('adminScreen').classList.add('active');
  await loadUsers();
  loadAdmin();
}

function logoutUser(){ location.reload(); }

function loadAdmin(){
  const box=$('adminUsers');
  box.innerHTML='';
  if(Object.keys(users).length===0){ box.innerHTML='<p>No users found</p>'; return; }

  for(let username in users){
    const u=users[username];
    box.innerHTML+=`
    <div class="admin-card">
      <h3>${username}</h3>
      <p>Status: ${u.banned ? '🚫 BANNED' : '✅ Active'}</p>
      <p>Points: ${u.points}</p>
      <p>Energy: ${u.energy}</p>
      <p>GCash: ${u.gcash || 'Not Set'}</p>
      <input id="energy_${username}" type="number" placeholder="Add Energy">
      <button onclick="addEnergy('${username}')">Add Energy</button>
      <button onclick="banUser('${username}')">🚫 Ban</button>
      <button onclick="unbanUser('${username}')">✅ Unban</button>
      <hr>
      <strong>Withdraw Requests</strong>
      ${(u.history||[]).map((h,i)=>h.status==='Pending'?`<div>${h.points} pts <button onclick="approveWithdraw('${username}',${i})">Approve</button></div>`:'').join('')}
      <hr>
      <strong>Set GCash Number</strong>
      <input id="gcash_${username}" type="text" placeholder="Enter GCash Number" value="${u.gcash||''}">
      <button onclick="addGcash('${username}')">Save GCash</button>
    </div>`;
  }
}

function addEnergy(username){ const val=parseInt($('energy_'+username).value); if(!val) return alert('Enter energy amount'); users[username].energy+=val; saveAndUpdate(username); alert('Energy added'); }
function approveWithdraw(username,index){ if(!users[username].history[index]) return; users[username].history[index].status='Approved'; saveAndUpdate(username); }
function addGcash(username){ const number=$('gcash_'+username).value.trim(); if(!number) return alert('Enter GCash number'); users[username].gcash=number; saveAndUpdate(username); alert('GCash number saved'); }
function banUser(username){ users[username].banned=true; saveAndUpdate(username); alert(username+' banned from earning'); }
function unbanUser(username){ users[username].banned=false; saveAndUpdate(username); alert(username+' unbanned'); }
function banByUsername(){ const u=$('banUsername').value.trim(); if(!u) return alert('Enter username'); if(!users[u]) return alert('User not found'); users[u].banned=true; saveAndUpdate(u); alert(u+' banned successfully'); }

window.loginUser=loginUser;
window.logoutUser=logoutUser;
window.addEnergy=addEnergy;
window.approveWithdraw=approveWithdraw;
window.addGcash=addGcash;
window.banUser=banUser;
window.unbanUser=unbanUser;
window.banByUsername=banByUsername;
</script>
