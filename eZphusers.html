<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch & Earn PRO</title>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://al5sm.com/tag.min.js" data-zone="10587611" async></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://pbwaozztfclanvplpmvm.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBid2Fvenp0ZmNsYW52cGxwbXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjQ1NzIsImV4cCI6MjA4NzgwMDU3Mn0.bbY-C4legzoHwQEiL3-IHwp8D6_hrL53GJPa78li1aY'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const POINT_RATE = 1000
const MIN_WITHDRAW = 50000
const TASK_COOLDOWN = 60000
const DAILY_ENERGY_LIMIT = 1800

let currentUser=null
let cooldownTimer=null
let users={}
let miniCounter=0
let ytPlayer=null
let ytUser=null
let currentFilter='all'

function $(id){return document.getElementById(id)}

const ytVideos=["fjy1wYj2Nh8","x9OuXv_GEmc","6bbqMf6xoOc","kLofAi46LuY","75GnzFvwYyM","DQ3JqS70CrU","2hTIyrD9sS0","tT8OaQINFws"]

async function loadUsers(){
 const {data,error}=await supabase.from('pin77_users').select('*')
 if(error){console.error(error);return}
 users={}
 data.forEach(u=>users[u.username]=u.data)
}

async function saveUser(username){
 const {error}=await supabase.from('pin77_users').upsert({username:username,data:users[username]})
 if(error)console.error(error)
}

async function saveAndUpdate(username){
 await saveUser(username)
 updateUI()
}

function autoConvertBalance(u){
 u.balance=Math.floor(u.points/POINT_RATE)
}

function resetDaily(u){
 const today=new Date().toDateString()
 if(u.lastEnergyReset!==today){
  u.dailyUsed=0
  u.lastEnergyReset=today
 }
}

function canUseEnergy(u,amount){
 resetDaily(u)
 if(u.dailyUsed>=DAILY_ENERGY_LIMIT) return false
 return true
}

function consumeEnergy(u,amount){
 resetDaily(u)
 if(u.dailyUsed+amount>DAILY_ENERGY_LIMIT) amount=DAILY_ENERGY_LIMIT-u.dailyUsed
 u.energy=Math.max(0,u.energy-amount)
 u.dailyUsed+=amount
}

async function loginUser(){
 const u=$('userInput').value.trim()
 const p=$('passInput').value.trim()
 if(!u||!p)return alert('Enter credentials')

 if(u==='admin' && p==='Titanvpn/10'){showAdmin();return}

 await loadUsers()

 if(!users[u]){
  users[u]={pass:p, points:0, balance:0, energy:1800, dailyUsed:0, lastEnergyReset:new Date().toDateString(), history:[], cooldowns:{ad:0, game:0}}
  await saveUser(u)
 }

 if(users[u].pass!==p)return alert('Wrong password')

 currentUser=u
 showGame()
}

function logoutUser(){location.reload()}

function updateUI(){
 if(!currentUser) return
 const u=users[currentUser]
 resetDaily(u)
 autoConvertBalance(u)

 $('pointsText').textContent=u.points
 $('balanceText').textContent=u.balance.toFixed(2)
 $('energyText').textContent=u.energy
 $('dailyUsedText').textContent=u.dailyUsed
 $('energyFill').style.width=Math.min(100,u.energy)+'%'
 $('watchBtn').disabled=u.energy<=0 || u.dailyUsed>=DAILY_ENERGY_LIMIT
 $('playBtn').disabled=u.energy<=0 || u.dailyUsed>=DAILY_ENERGY_LIMIT

 loadHistory()
 loadTransferHistory()
}

function showGame(){
 $('loginScreen').classList.remove('active')
 $('adminScreen').classList.remove('active')
 $('gameScreen').classList.add('active')
 startCooldownTimer()
 updateUI()
}

function showAdmin(){
 $('loginScreen').classList.remove('active')
 $('gameScreen').classList.remove('active')
 $('adminScreen').classList.add('active')
 loadAdmin()
}

function startCooldownTimer(){
 if(cooldownTimer) clearInterval(cooldownTimer)
 cooldownTimer=setInterval(()=>{
  if(!currentUser) return
  const u=users[currentUser]
  const now=Date.now()
  $('adCooldown').textContent=u.cooldowns.ad>now?'Ad cooldown '+Math.ceil((u.cooldowns.ad-now)/1000)+'s':''
  updateUI()
 },1000)
}

function watchAd(){
 const u=users[currentUser]
 if(!u||u.energy<=0) return
 if(!canUseEnergy(u,10)) return alert('Daily energy limit reached. Come back tomorrow.')
 if(Date.now()<u.cooldowns.ad) return

 ytUser=currentUser
 const randomId=ytVideos[Math.floor(Math.random()*ytVideos.length)]
 $('ytModal').style.display='flex'

 if(ytPlayer){ ytPlayer.loadVideoById(randomId) }
 else{
  ytPlayer=new YT.Player('ytFrame',{
   videoId:randomId,
   playerVars:{autoplay:1,controls:0},
   events:{onStateChange:onYTStateChange}
  })
 }
}

function onYTStateChange(e){
 if(e.data===0){
  giveYTReward()
 }
}

function giveYTReward(){
 if(!ytUser) return
 const u=users[ytUser]
 $('ytModal').style.display='none'
 const reward=Math.floor(Math.random()*41)+30
 u.points+=reward
 consumeEnergy(u,10)
 u.cooldowns.ad=Date.now()+TASK_COOLDOWN
 addHistory({type:'watch',points:reward,status:'Completed',date:Date.now()})
 ytUser=null
 saveAndUpdate(currentUser)
}

function playGame(){
  const u=users[currentUser]
  if(!u) return
  if(!canUseEnergy(u,10)) return alert('Daily energy limit reached. Come back tomorrow.')
  miniCounter=0
  $('miniClicks').textContent=0
  $('miniGamePopup').style.display='flex'
}

function miniClick(){
  miniCounter++
  $('miniClicks').textContent=miniCounter
  if(miniCounter>=5) finishMiniGame()
}

function finishMiniGame(){
  const u=users[currentUser]
  $('miniGamePopup').style.display='none'
  const reward=Math.floor(Math.random()*31)+20
  u.points+=reward
  autoConvertBalance(u)
  consumeEnergy(u,10)
  u.cooldowns.game=Date.now()+TASK_COOLDOWN
  addHistory({type:'game',points:reward,status:'Completed',date:Date.now()})
  $('rewardDisplay').textContent='You earned '+reward+' points!'
  saveAndUpdate(currentUser)
}

function closeMiniGame(){
  $('miniGamePopup').style.display='none'
}

function addHistory(entry){
 const u=users[currentUser]
 if(!u.history)u.history=[]
 u.history.push(entry)
 if(u.history.length>50)u.history=u.history.slice(-50)
}

function loadHistory(){
 const u=users[currentUser]
 const box=$('historyBox')
 if(!box||!u) return
 box.innerHTML=''

 u.history.slice().reverse().forEach(h=>{
  if(currentFilter!=='all'&&h.type!==currentFilter) return
  if(h.type==='watch') box.innerHTML+='<div>🎥 Watch +'+h.points+'</div>'
  else if(h.type==='game') box.innerHTML+='<div>🎮 Game +'+h.points+'</div>'
  else if(h.type==='withdraw') box.innerHTML+='<div>💸 Withdraw '+h.points+' '+h.status+'</div>'
 })
}

function setFilter(f){
 currentFilter=f
 loadHistory()
}

function withdrawPoints(){
 const amt=parseInt($('withdrawInput').value)
 const u=users[currentUser]
 if(!amt||amt<MIN_WITHDRAW) return $('withdrawMsg').textContent='Minimum 50000 points'
 if(amt>u.points) return $('withdrawMsg').textContent='Not enough points'

 u.points-=amt
 addHistory({type:'withdraw',points:amt,status:'Pending',date:Date.now()})
 $('withdrawMsg').textContent='Withdrawal pending admin approval'
 saveAndUpdate(currentUser)
}

async function transferBalance(){
 const toUser=$('transferUser').value.trim()
 const amount=parseFloat($('transferAmount').value)

 if(!toUser||!amount)return $('transferMsg').textContent='Enter username and amount'
 if(!users[toUser])return $('transferMsg').textContent='User not found or user exceed the limit'
 if(toUser===currentUser)return $('transferMsg').textContent='Cannot send to yourself'

 const sender=users[currentUser]
 const receiver=users[toUser]

 autoConvertBalance(sender)

 if(sender.balance<amount)return $('transferMsg').textContent='Insufficient balance'

 const fee=amount*0.05
 const receiveAmount=amount-fee

 const senderPoints=Math.floor(amount*POINT_RATE)
 const receiverPoints=Math.floor(receiveAmount*POINT_RATE)

 sender.points-=senderPoints
 receiver.points+=receiverPoints

 autoConvertBalance(sender)
 autoConvertBalance(receiver)

 const ref='TX'+Date.now()

 sender.history.push({type:'transfer_out',sender:currentUser,amount:amount,ref:ref,date:Date.now()})
 receiver.history.push({type:'transfer_in',sender:currentUser,amount:receiveAmount,ref:ref,date:Date.now()})

 await saveUser(currentUser)
 await saveUser(toUser)

 $('transferMsg').textContent='Transfer successful (5% fee applied)'

 updateUI()
}

function loadTransferHistory(){
 const u=users[currentUser]
 const box=$('transferHistory')
 if(!u||!box)return

 box.innerHTML=''

 const history=(u.history||[]).filter(h=>h.type==='transfer_out'||h.type==='transfer_in')

 history.slice().reverse().forEach(h=>{

  const tr=document.createElement('tr')

  const date=new Date(h.date).toLocaleString()
  const sender=h.sender
  const amount='₱'+Number(h.amount).toFixed(2)
  const ref=h.ref

  tr.innerHTML=`
  <td>${date}</td>
  <td>${sender}</td>
  <td>${amount}</td>
  <td>${ref}</td>
  `

  box.appendChild(tr)
 })
}

function loadAdmin(){
 const box=$('adminUsers')
 box.innerHTML=''

 for(let username in users){
  const u=users[username]
  box.innerHTML+=`<div class='admin-box'>
   <strong>${username}</strong><br>
   Points:${u.points} | Energy:${u.energy}<br>
   <input id='energy_${username}' placeholder='Add Energy'>
   <button onclick="addEnergy('${username}')">Add Energy</button>
  </div>`
 }
}

function addEnergy(username){
 const input=$('energy_'+username)
 const val=parseInt(input.value)
 if(!val) return alert('Enter energy amount')
 users[username].energy+=val
 saveAndUpdate(username)
}

window.loginUser=loginUser
window.logoutUser=logoutUser
window.watchAd=watchAd
window.playGame=playGame
window.miniClick=miniClick
window.closeMiniGame=closeMiniGame
window.setFilter=setFilter
window.withdrawPoints=withdrawPoints
window.transferBalance=transferBalance
window.addEnergy=addEnergy
</script>

<style>
#ytFrame{width:100%;aspect-ratio:16/9}
#ytFrame iframe{width:100%!important;height:100%!important}
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.screen{display:none;padding:20px}
.active{display:block}
.card{background:#1e293b;border-radius:14px;padding:16px;margin:10px 0}
button{padding:10px;border-radius:8px;border:none;background:#22c55e;color:white;font-weight:bold;margin:4px}
input{padding:10px;border-radius:8px;border:none;width:100%;margin:5px 0}
.center{text-align:center}
.energy-bar{height:14px;background:#334155;border-radius:10px;overflow:hidden}
.energy-fill{height:100%;background:#22c55e;width:100%}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.popup-content{background:#000;padding:20px;border-radius:16px;width:90%;max-width:320px;text-align:center}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #334155;padding:6px;text-align:center}
.admin-box{background:#1e293b;padding:10px;margin:6px 0;border-radius:10px}
</style>
</head>

<body>

<div id="loginScreen" class="screen active center">
<h2>Login</h2>
<input id="userInput" placeholder="Username">
<input id="passInput" type="password" placeholder="Password">
<button onclick="loginUser()">Login / Register</button>
</div>

<div id="gameScreen" class="screen">
<h2 class="center">Watch & Earn</h2>

<div class="card center">
<div style="font-size:60px">🐥</div>

<div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div>

<p>Energy: <span id="energyText"></span></p>
<p>Daily Used: <span id="dailyUsedText"></span></p>
<p>Points: <span id="pointsText"></span></p>
<p>Balance: ₱<span id="balanceText"></span></p>

<p id="adCooldown"></p>
</div>

<div class="card center">
<button id="watchBtn" onclick="watchAd()">▶️ Watch Video Reward</button>
<button id="playBtn" onclick="playGame()">🎮 Play Game Reward</button>
</div>

<div class="card">
<h3>Transfer Balance</h3>

<input id="transferUser" placeholder="Recipient Username">
<input id="transferAmount" placeholder="Amount (₱)">

<button onclick="transferBalance()">Send</button>
<p id="transferMsg"></p>

<h4>Transfer History</h4>

<table>
<thead>
<tr>
<th>Date</th>
<th>Sender</th>
<th>Amount</th>
<th>Reference</th>
</tr>
</thead>
<tbody id="transferHistory"></tbody>
</table>

</div>


<div class="card">
<h3>Withdraw (Min 50000 pts)</h3>
<input id="withdrawInput" placeholder="Points to withdraw">
<button onclick="withdrawPoints()">Withdraw</button>
<p id="withdrawMsg"></p>

<h4>History</h4>
<div style="margin-bottom:8px">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('watch')">Watch</button>
<button onclick="setFilter('game')">Game</button>
<button onclick="setFilter('withdraw')">Withdraw</button>
</div>

<div id="historyBox"></div>
</div>


<button onclick="logoutUser()">Logout</button>
</div>

<div id="miniGamePopup" class="popup">
<div class="popup-content">
<h3>Click Chick 5x</h3>
<p><span id="miniClicks">0</span>/5</p>
<button onclick="miniClick()" style="font-size:40px">🐥</button><br><br>
<button onclick="closeMiniGame()">Cancel</button>
</div>
</div>

<div id="ytModal" class="popup">
<div class="popup-content">
<h3>Watch Full Video To Earn Reward</h3>
<div id="ytFrame"></div>
<p id="rewardDisplay" style="color:#ffd700;font-weight:bold"></p>
</div>
</div>

<div id="adminScreen" class="screen">
<h2>Admin Dashboard</h2>
<div id="adminUsers"></div>
<button onclick="logoutUser()">Logout</button>
</div>

</body>
</html>
