<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL="https://pbwaozztfclanvplpmvm.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBid2Fvenp0ZmNsYW52cGxwbXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjQ1NzIsImV4cCI6MjA4NzgwMDU3Mn0.bbY-C4legzoHwQEiL3-IHwp8D6_hrL53GJPa78li1aY"

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

let username = localStorage.getItem("username") || null
let userData = null
let spins = 20
let shoutCooldown = 0
let shoutInterval = null
let isSendingShout = false
let rpTime = 600 // 10 minutes in seconds
let rpInterval = null
let rpReady = false

function $(id){return document.getElementById(id)}

async function loadUser(){

if(!username){
  alert("No login session found. Please login first and maintain ₱10 balance to access this page.")
  return
}

const {data}=await supabase
.from("pin77_users")
.select("*")
.eq("username",username)
.single()

if(!data){
alert("User not found")
return
}

userData = data?.data ?? {}

userData.walletHistory = Array.isArray(userData.walletHistory)
  ? userData.walletHistory
  : []

userData.cashechobalance = Number(userData.cashechobalance)
  ? userData.cashechobalance
  : 0

userData.spins = Number(userData.spins)
  ? userData.spins
  : 20

userData.lastSpinReset = userData.lastSpinReset || ""

spins = userData.spins

updateUI()
loadHistory()
loadShoutouts()
startShoutCooldown()

// 🔓 UNLOCK AUDIO ON FIRST TOUCH
document.body.addEventListener("click", ()=>{
const radio = document.getElementById("radioPlayer")
if(radio){
radio.play().then(()=>{
radio.pause()
radio.currentTime = 0
}).catch(()=>{})
}
}, { once:true })

supabase
.channel('balance-watch')
.on(
'postgres_changes',
{
event:'UPDATE',
schema:'public',
table:'pin77_users'
},
(payload)=>{

if(payload.new.username === username){

userData = payload.new.data ?? {}

userData.walletHistory = Array.isArray(userData.walletHistory)
  ? userData.walletHistory
  : []

userData.cashechobalance = Number(userData.cashechobalance) || 0

updateUI()
loadHistory()
}

}
)
.subscribe()

// realtime shoutouts
supabase
.channel('shoutouts')
.on('postgres_changes',{
event:'INSERT',
schema:'public',
table:'shoutouts'
},()=>{
loadShoutouts()
})
.subscribe()

}

async function saveUser(){

await supabase
.from("pin77_users")
.update({data:userData})
.eq("username",username)

updateUI()

}

function updateUI(){

$("cashechobalance").innerText="₱"+userData.cashechobalance.toFixed(2)
$("spinLeft").innerText=spins

}

function showTab(tab){

document.querySelectorAll(".tab")
.forEach(t=>t.style.display="none")

$(tab).style.display="block"

}

// ================= SHOUTOUT SYSTEM =================

async function sendShoutout(){

if(!username){
  alert("Invalid session. Please login again in and maintain ₱10 balance to access this page.")
  return
}

if(isSendingShout) return

if(shoutCooldown > 0){
alert("Wait "+shoutCooldown+" seconds before sending again")
return
}

let msg = $("shoutInput").value.trim()
if(!msg) return alert("Enter message")

isSendingShout = true

const btn = document.querySelector("#shoutTab button")
btn.disabled = true

try{

let reward = (Math.random()*0.9 + 0.05)
reward = parseFloat(reward.toFixed(2))

// ✅ CHECK ERROR PROPERLY
const { error } = await supabase
.from("shoutouts")
.insert({
username: username,
message: msg,
date: Date.now()
})

if(error){
console.log("Insert error:", error)
throw error
}


await loadShoutouts() 

// ✅ reward ONLY if success
userData.cashechobalance += reward

userData.walletHistory.push({
type:"shout",
amount:reward,
date:Date.now()
})

// sounds
const click = document.getElementById("clickSound")

if(click){
  click.currentTime = 0
  click.play().catch(err=>{
    console.log("Click sound blocked:", err)
  })
}

const radio = document.getElementById("radioPlayer")
if(radio){
radio.pause()
radio.currentTime = 0
radio.muted = false
radio.play().catch(()=>{})
}

alert("📢 Shoutout sent! Reward ₱"+reward)

$("shoutInput").value=""

saveUser()
loadHistory()
loadShoutouts()


// ✅ ALWAYS START COOLDOWN AFTER SUCCESS
startShoutCooldown()

}catch(e){
console.error(e)
alert("Error sending shoutout")

btn.disabled = false

}finally{
isSendingShout = false
}

}

function startShoutCooldown(){

shoutCooldown = 10

const btn = document.querySelector("#shoutTab button")

btn.disabled = true

btn.innerText = "WAIT 10s"

// clear old interval (important!)
if(shoutInterval){
clearInterval(shoutInterval)
}

shoutInterval = setInterval(()=>{

shoutCooldown--

btn.innerText = "WAIT "+shoutCooldown+"s"

if(shoutCooldown <= 0){

clearInterval(shoutInterval)

btn.disabled = false
btn.innerText = "SEND SHOUTOUT"

}

},1000)

}

async function loadShoutouts(){

const {data, error}=await supabase
.from("shoutouts")
.select("*")
.order("id",{ascending:false})
.limit(50)

if(error){
console.log(error)
return
}

let html=""

if(data){
data.forEach(s=>{
html+=`<div style="background:#1e293b;padding:10px;border-radius:10px;margin-bottom:8px">
<b>${s.username}</b><br>
<span>${s.message}</span>
</div>`
})
}

$("shoutList").innerHTML=html

}

window.sendShoutout=sendShoutout

// 🔓 AUDIO UNLOCK (STEP 1 FIX)
function unlockAudio(){
  const radio = document.getElementById("radioPlayer")

  if(!radio) return

  radio.muted = false
  radio.volume = 1

  radio.play()
  .then(()=>{
    console.log("Audio unlocked")
  })
  .catch(err=>{
    console.log("Blocked autoplay:", err)
  })
}

// 👇 IMPORTANT: global click listener
document.addEventListener("click", unlockAudio, { once:true })

// ================= EXISTING SYSTEM =================

function spin(){

const now = new Date()
const hour = now.getHours()
const minute = now.getMinutes()

if(!(hour === 11 && minute === 0)){
alert("Slot spin is available ONLY at exactly 11:00 AM")
return
}

const today = new Date().toDateString()

if(userData.lastSpinReset !== today){

spins = 20
userData.lastSpinReset = today

}

if(spins <= 0){
alert("No spins left")
return
}

if(userData.cashechobalance < 1){
alert("Not enough balance")
return
}

spins--

userData.cashechobalance-=1

const icons=["🍒","🍋","💎","7️⃣","⭐"]

let r1=icons[Math.floor(Math.random()*5)]
let r2=icons[Math.floor(Math.random()*5)]
let r3=icons[Math.floor(Math.random()*5)]

$("slot").innerText=r1+" "+r2+" "+r3

let reward=0

if(r1===r2 && r2===r3) reward=15
else if(r1===r2 || r2===r3) reward=5

userData.cashechobalance+=reward

if(reward>0){

alert("WIN ₱"+reward)

userData.walletHistory.push({
type:"slot",
amount:reward,
date:Date.now()
})

}

saveUser()
loadHistory()

}

const products=[

{name:"iPhone 17 Pro",price:70390,inventory:61},
{name:"VIVO Phone",price:25600,inventory:46},
{name:"₱5000 Voucher",price:4000,inventory:500},
{name:"₱500 Voucher",price:750,inventory:5}, 
{name:"₱300 Voucher",price:450,inventory:10}

]

function loadStore(){

let html=""

products.forEach(p=>{

html+=`
<div class="product">

<h3>${p.name}</h3>

<p>Price: ₱${p.price}</p>

<p>Inventory: ${p.inventory}</p>

<button onclick="buy('${p.name}',${p.price})">
Redeem
</button>

</div>
`

})

$("store").innerHTML=html

}

function buy(name,price){

if(userData.cashechobalance<price)
return alert("Insufficient balance")

userData.cashechobalance-=price

userData.walletHistory.push({
type:"purchase",
item:name,
price:price,
date:Date.now()
})

alert("Redeemed "+name)

saveUser()
loadHistory()

}

function claimInterest(){

const today=new Date().toDateString()

if(userData.lastInterest===today)
return alert("Already claimed today")

const interest=userData.cashechobalance*0.0005

userData.cashechobalance+=interest
userData.lastInterest=today

userData.walletHistory.push({
type:"interest",
amount:interest,
date:Date.now()
})

alert("Interest ₱"+interest.toFixed(2))

saveUser()
loadHistory()

}

function startRedPacket(){

// 🛑 kung may tumatakbo na, wag na ulit mag start
if(rpInterval) clearInterval(rpInterval)

rpTime = 600
rpReady = false

updateRPTimer()

rpInterval = setInterval(()=>{

rpTime--

updateRPTimer()

if(rpTime <= 0){
clearInterval(rpInterval)
rpInterval = null // ✅ important
rpReady = true

document.getElementById("rpTimer").innerText = "CLAIM"
document.getElementById("redPacket").style.boxShadow = "0 0 20px gold"
}

},1000)

}

function updateRPTimer(){

let m = Math.floor(rpTime/60)
let s = rpTime % 60

document.getElementById("rpTimer").innerText =
m.toString().padStart(2,'0') + ":" +
s.toString().padStart(2,'0')

}

function claimRedPacket(){

if(!rpReady){
alert("Wait for 10 minutes to claim reward")
return
}

// reward ₱0.10 to ₱2
let reward = Math.random() * (2 - 0.1) + 0.1
reward = parseFloat(reward.toFixed(2))

userData.cashechobalance += reward

userData.walletHistory.push({
type:"redpacket",
amount:reward,
date:Date.now()
})

alert("🧧 You received from redpacket ₱"+reward)

saveUser()
loadHistory()

// 🔴 hide after claim
document.getElementById("redPacket").style.display = "none"

// restart timer
startRedPacket()

}

function checkRedPacketWindow(){

const now = new Date()
const hour = now.getHours()
const minute = now.getMinutes()

const rp = document.getElementById("redPacket")
if(!rp) return

const isWindow = (hour === 17 && minute >= 0 && minute <= 40)

if(isWindow){

// show
rp.style.display = "flex"

// start timer if not running
if(!rpInterval){
startRedPacket()
}

}else{

// 🚀 FORCE FULL RESET after 7:40 PM
rp.style.display = "none"
rpReady = false

if(rpInterval){
clearInterval(rpInterval)
rpInterval = null
}

// reset timer UI
document.getElementById("rpTimer").innerText = "07:00"
rpTime = 600
}
}

function startCountdown(){

setInterval(()=>{

const now = new Date()

const target = new Date()

target.setHours(11,0,0,0)

if(now > target){
target.setDate(target.getDate()+1)
}

const diff = target - now

const h = Math.floor(diff/3600000)
const m = Math.floor(diff%3600000/60000)
const s = Math.floor(diff%60000/1000)

$("countdown").innerText =
h.toString().padStart(2,'0')+":"
+m.toString().padStart(2,'0')+":"
+s.toString().padStart(2,'0')

},1000)

}

function startAutoRefresh(){

// 🔄 data refresh (every 1 min)
setInterval(()=>{
loadUser()
loadShoutouts()
console.log("🔄 Data refreshed")
}, 60000)

// 🔴 REAL-TIME red packet checker (every 1 second)
setInterval(()=>{
checkRedPacketWindow()
}, 1000)

// ✅ IMPORTANT: run immediately on start
checkRedPacketWindow()
}

function loadHistory(){

let html=""

userData.walletHistory
.slice()
.reverse()
.forEach(h=>{

if(h.type==="slot")
html+="<div>🎰 Slot Win ₱"+h.amount+"</div>"

if(h.type==="purchase")
html+="<div>🎁 Purchase "+h.item+"</div>"

if(h.type==="interest")
html+="<div>🪙 Interest ₱"+h.amount.toFixed(2)+"</div>"

if(h.type==="redpacket")
html+="<div>🧧 Red Packet ₱"+h.amount+"</div>"

if(h.type==="shout")
html+="<div>📢 Shout Reward ₱"+h.amount+"</div>"

})

$("history").innerHTML=html

}

window.spin=spin
window.buy=buy
window.showTab=showTab
window.claimInterest=claimInterest
window.claimRedPacket = claimRedPacket

loadUser()
loadStore()
startCountdown()
startAutoRefresh()

</script>
