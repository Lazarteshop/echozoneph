<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://pbwaozztfclanvplpmvm.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBid2Fvenp0ZmNsYW52cGxwbXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjQ1NzIsImV4cCI6MjA4NzgwMDU3Mn0.bbY-C4legzoHwQEiL3-IHwp8D6_hrL53GJPa78li1aY'
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const POINT_RATE=1000;
const MIN_WITHDRAW=100000;
const TASK_COOLDOWN=60000;
const DAILY_ENERGY_LIMIT=500;

let currentUser=null;
let cooldownTimer=null;
let users={};
let miniCounter=0;
let ytPlayer=null;
let ytUser=null;
let currentFilter='all';

function $(id){return document.getElementById(id)}

async function loadUsers(){
  const { data, error } = await supabase.from('pin77_users').select('*')
  if(error) return console.error(error)
  users={}
  data.forEach(u=>{users[u.username]=u.data})
}

async function saveUser(username){
  if(!users[username]) return
  const { error } = await supabase.from('pin77_users').upsert({ username: username, data: users[username] })
  if(error) console.error(error)
}

async function saveAndUpdate(username){
  await saveUser(username)
  if(currentUser==='admin') loadAdmin()
  else updateUI()
}

function autoConvertBalance(u){ if(!u) return; u.balance=Math.floor(u.points/POINT_RATE) }
function resetDailyUsage(u){ const today=new Date().toDateString(); if(u.lastEnergyReset!==today){ u.dailyUsed=0; u.lastEnergyReset=today } }
function canUseEnergy(u,amount){ resetDailyUsage(u); if(u.dailyUsed>=DAILY_ENERGY_LIMIT) return false; return true }
function consumeEnergy(u,amount){ resetDailyUsage(u); if(u.dailyUsed+amount>DAILY_ENERGY_LIMIT) amount=DAILY_ENERGY_LIMIT-u.dailyUsed; u.energy=Math.max(0,u.energy-amount); u.dailyUsed+=amount }

async function loginUser(){
  const u=$('userInput').value.trim(), p=$('passInput').value.trim();
  if(!u||!p) return alert('Enter credentials')
  if(u==='admin' && p==='admin123'){ currentUser='admin'; showAdmin(); return }
  await loadUsers()
  if(!users[u]){ users[u]={pass:p, points:0, balance:0, energy:500, dailyUsed:0, lastEnergyReset:new Date().toDateString(), history:[], cooldowns:{ad:0, game:0, chest:0}, gcash:''}; await saveUser(u) }
  if(users[u].pass!==p) return alert('Wrong password')
  currentUser=u
  showGame()
}
function logoutUser(){ location.reload() }

function updateUI(){ if(!currentUser) return; const u=users[currentUser]; resetDailyUsage(u); autoConvertBalance(u);
  $('pointsText').textContent=u.points; $('balanceText').textContent=u.balance.toFixed(2); $('energyText').textContent=u.energy;
  $('dailyUsedText').textContent=u.dailyUsed; $('energyFill').style.width=Math.min(100,u.energy)+'%';
  $('watchBtn').disabled=u.energy<=0 || u.dailyUsed>=DAILY_ENERGY_LIMIT;
  $('playBtn').disabled=u.energy<=0 || u.dailyUsed>=DAILY_ENERGY_LIMIT;
  loadHistory()
}

function showGame(){ $('loginScreen').classList.remove('active'); $('adminScreen').classList.remove('active'); $('gameScreen').classList.add('active'); startCooldownTimer(); updateUI() }
function showAdmin(){ $('loginScreen').classList.remove('active'); $('gameScreen').classList.remove('active'); $('adminScreen').classList.add('active'); loadAdmin() }

function startCooldownTimer(){
  if(cooldownTimer) clearInterval(cooldownTimer)
  cooldownTimer=setInterval(()=>{
    if(!currentUser) return;
    const u=users[currentUser]; const now=Date.now();
    $('adCooldown').textContent=u.cooldowns.ad>now?'Ad cooldown '+Math.ceil((u.cooldowns.ad-now)/1000)+'s':'';
    $('gameCooldown').textContent=u.cooldowns.game>now?'Game cooldown '+Math.ceil((u.cooldowns.game-now)/1000)+'s':'';
    updateUI();
  },1000)
}

// YouTube and mini-game logic unchanged...

function loadAdmin(){
  const box=$('adminUsers'); box.innerHTML=''; loadAdminUsers();
  for(let username in users){
    const u=users[username];
    box.innerHTML+=`<div class='admin-box'>
      <strong>${username}</strong><br>
      Points: ${u.points} | Energy: ${u.energy} | GCash: ${u.gcash||'Not Set'}<br>
      <input id='energy_${username}' placeholder='Add Energy'> <button onclick="addEnergy('${username}')">Add Energy</button>
      <h4>Withdraw Requests</h4>
      ${u.history?.map((h,i)=>h.status==='Pending'?`<div>${h.points} pts <button onclick="approveWithdraw('${username}',${i})">Approve</button></div>`:'').join('')}
    </div>`
  }
}

function loadAdminUsers(){
  const select=$('adminUserSelect'); if(!select) return; select.innerHTML='';
  Object.keys(users).forEach(u=>{ const opt=document.createElement('option'); opt.value=u; opt.textContent=u; select.appendChild(opt) })
}

function adminSetGcash(){
  const username=$('adminUserSelect').value; const gcash=$('adminGcashInput').value.trim();
  if(!username||!gcash) return alert('Enter GCash number'); if(!users[username]) return;
  users[username].gcash=gcash; saveAndUpdate(username); alert('GCash number saved')
}

function addEnergy(username){ const input=$('energy_'+username); const val=parseInt(input.value); if(!val) return alert('Enter energy amount'); users[username].energy+=val; saveAndUpdate(username); alert('Energy added') }
function approveWithdraw(username,index){ const u=users[username]; if(!u||!u.history[index]) return; u.history[index].status='Approved'; saveAndUpdate(username) }

window.loginUser=loginUser; window.logoutUser=logoutUser; window.adminSetGcash=adminSetGcash;
window.addEnergy=addEnergy; window.approveWithdraw=approveWithdraw
</script>

<style>

.card{background:#1e293b;border-radius:16px;padding:16px;margin:10px 0}

.center{text-align:center}
.energy-bar{height:14px;background:#334155;border-radius:10px;overflow:hidden;margin:10px 0}
.energy-fill{height:100%;background:#22c55e;width:100%}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
.popup-content{background:#000;padding:20px;border-radius:16px;width:90%;max-width:400px;text-align:center}
.admin-box{background:#1e293b;padding:10px;margin:8px 0;border-radius:10px;overflow:auto;max-height:300px}
</style>
</head>
<body>
<div id="loginScreen" class="screen active center">
<h2>Login</h2>
<input id="userInput" placeholder="Username with gcash#">
<input id="passInput" type="password" placeholder="Password">
<button onclick="loginUser()">Login / Register</button>
</div>
<div id="gameScreen" class="screen"><h2 class="center">🐥 PIN77 PRO</h2><div class="card center"><div style="font-size:70px">🐥</div><div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div><p>Energy: <span id="energyText"></span></p><p>Daily Used: <span id="dailyUsedText">0</span>/500</p><p>Points: <span id="pointsText"></span></p><p>Balance: ₱<span id="balanceText"></span></p><p id="adCooldown"></p><p id="gameCooldown"></p></div><button onclick="logoutUser()">Logout</button></div>
<div id="adminScreen" class="screen"><h2>Admin Dashboard</h2><div id="adminUsers" style="max-height:500px;overflow:auto"></div><hr><h3>Set User GCash Number</h3><select id="adminUserSelect"></select><input id="adminGcashInput" placeholder="Enter GCash Number"><button onclick="adminSetGcash()">Save GCash</button><br><br><button onclick="logoutUser()">Logout</button></div>
</body>
</html>
