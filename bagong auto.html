<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN77 Idle Chick PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.screen{display:none;padding:20px}
.active{display:block}
.card{background:#1e293b;border-radius:16px;padding:16px;margin:10px 0}
button{padding:10px;border-radius:8px;border:none;background:#22c55e;color:#fff;font-weight:bold;margin:4px;cursor:pointer}
button:disabled{background:#64748b;cursor:not-allowed}
input{padding:10px;border-radius:8px;border:none;margin:4px 0}
.center{text-align:center}
.energy-bar{height:14px;background:#334155;border-radius:10px;overflow:hidden;margin:10px 0}
.energy-fill{height:100%;background:#22c55e;width:100%}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.popup-content{background:#78350f;padding:20px;border-radius:16px;width:90%;max-width:320px;text-align:center}
.admin-box{background:#1e293b;padding:10px;margin:8px 0;border-radius:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
<h2>Login</h2>
<input id="userInput" placeholder="Username"><br>
<input id="passInput" type="password" placeholder="Password"><br>
<button onclick="loginUser()">Login / Register</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<h2>🐥 PIN77 PRO</h2>
<div class="card center">
<div style="font-size:70px">🐥</div>
<div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div>
<p>Energy: <span id="energyText"></span></p>
<p>Points: <span id="pointsText"></span></p>
<p>Balance: ₱<span id="balanceText"></span></p>
</div>

<div class="card">
<button id="watchBtn" onclick="watchAd()">▶️ Watch Ad (+50)</button>
<button id="playBtn" onclick="playGame()">🎮 Play Game (+30)</button>
</div>

<div class="card">
<h3>Withdraw (Min: 1000 pts)</h3>
<input id="withdrawInput" placeholder="Points to withdraw">
<button onclick="withdrawPoints()">Withdraw</button>
<p id="withdrawMsg"></p>
<h4>History</h4>
<div id="historyBox"></div>
</div>

<button onclick="logoutUser()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
<h2>Admin Dashboard</h2>
<div id="adminUsers"></div>
<button onclick="logoutUser()">Logout</button>
</div>

<script>
// ===== CONFIG =====
const POINT_RATE = 1000;
const MIN_WITHDRAW = 1000;
const TASK_COOLDOWN = 60000;

let currentUser = null;
let cooldownTimer = null;
let users = JSON.parse(localStorage.getItem('pin77_users') || '{}');

function $(id){ return document.getElementById(id); }
function save(){ localStorage.setItem('pin77_users', JSON.stringify(users)); }

// ===== LOGIN =====
function loginUser(){
  const uEl = $('userInput');
  const pEl = $('passInput');
  if(!uEl || !pEl) return;

  const u = uEl.value.trim();
  const p = pEl.value.trim();

  if(!u || !p) return alert('Enter credentials');

  if(u === 'admin' && p === 'admin123'){
    showAdmin(); return;
  }

  if(!users[u]){
    users[u] = {
      pass:p,
      points:0,
      balance:0,
      energy:100,
      history:[],
      cooldowns:{ad:0,game:0,chest:0}
    };
  }

  if(users[u].pass !== p) return alert('Wrong password');

  currentUser = u;
  save();
  showGame();
}

function logoutUser(){ location.reload(); }

// ===== SCREEN CONTROL =====
function showGame(){
  const loginEl = $('loginScreen');
  const adminEl = $('adminScreen');
  const gameEl = $('gameScreen');

  if(loginEl) loginEl.classList.remove('active');
  if(adminEl) adminEl.classList.remove('active');
  if(gameEl) gameEl.classList.add('active');

  startCooldownTimer();
  updateUI();
}

function showAdmin(){
  const loginEl = $('loginScreen');
  const gameEl = $('gameScreen');
  const adminEl = $('adminScreen');

  if(loginEl) loginEl.classList.remove('active');
  if(gameEl) gameEl.classList.remove('active');
  if(adminEl) adminEl.classList.add('active');

  loadAdmin();
}

// ===== UI =====
function updateUI(){
  if(!currentUser) return;

  const u = users[currentUser];

  const pts = $('pointsText');
  const bal = $('balanceText');
  const energy = $('energyText');
  const fill = $('energyFill');
  const watchBtn = $('watchBtn');
  const playBtn = $('playBtn');

  if(pts) pts.textContent = u.points;
  if(bal) bal.textContent = u.balance.toFixed(2);
  if(energy) energy.textContent = u.energy;
  if(fill) fill.style.width = u.energy + '%';

  if(watchBtn) watchBtn.disabled = u.energy <= 0 || Date.now() < u.cooldowns.ad;
  if(playBtn) playBtn.disabled = u.energy <= 0 || Date.now() < u.cooldowns.game;

  loadHistory();
}

// ===== TASKS =====
function watchAd(){
  const u = users[currentUser];
  if(!u || u.energy <= 0) return;
  if(Date.now() < u.cooldowns.ad) return;

  u.points += 50;
  u.energy = Math.max(0, u.energy - 10);
  u.cooldowns.ad = Date.now() + TASK_COOLDOWN;

  save(); updateUI();
}

function playGame(){
  const u = users[currentUser];
  if(!u || u.energy <= 0) return;
  if(Date.now() < u.cooldowns.game) return;

  u.points += 30;
  u.energy = Math.max(0, u.energy - 10);
  u.cooldowns.game = Date.now() + TASK_COOLDOWN;

  save(); updateUI();
}

// ===== COOLDOWN TIMER =====
function startCooldownTimer(){
  if(cooldownTimer) clearInterval(cooldownTimer);

  cooldownTimer = setInterval(()=>{
    if(!currentUser) return;

    const u = users[currentUser];
    const now = Date.now();

    const adEl = $('adCooldown');
    const gameEl = $('gameCooldown');
    const chestEl = $('chestCooldown');

    if(adEl) adEl.textContent = u.cooldowns.ad > now ?
      'Ad cooldown ' + Math.ceil((u.cooldowns.ad-now)/1000)+'s' : '';

    if(gameEl) gameEl.textContent = u.cooldowns.game > now ?
      'Game cooldown ' + Math.ceil((u.cooldowns.game-now)/1000)+'s' : '';

    if(chestEl) chestEl.textContent = u.cooldowns.chest > now ?
      'Chest cooldown ' + Math.ceil((u.cooldowns.chest-now)/1000)+'s' : '';
  },1000);
}

// ===== CHEST SYSTEM =====
function openChest(){
  const u = users[currentUser];
  if(!u) return;

  const now = Date.now();
  if(now < u.cooldowns.chest) return;

  const reward = Math.floor(Math.random()*40+20);
  u.points += reward;
  u.cooldowns.chest = now + TASK_COOLDOWN;

  if($('rewardText'))
    $('rewardText').textContent = 'You got '+reward+' points!';

  const chest = $('chest');
  if(chest) chest.classList.add('open');

  const audio = $('rewardSound');
  if(audio) audio.play().catch(()=>{});

  save(); updateUI();
}

function closePopup(){
  if($('popup')) $('popup').style.display='none';
  if($('chest')) $('chest').classList.remove('open');
  if($('rewardText')) $('rewardText').textContent='';
}

// ===== WITHDRAW =====
function withdrawPoints(){
  const amt = parseInt($('withdrawInput')?.value);
  const u = users[currentUser];

  if(!amt || amt < MIN_WITHDRAW)
    return $('withdrawMsg').textContent = 'Minimum withdraw is 1000 points';

  if(amt > u.points)
    return $('withdrawMsg').textContent = 'Not enough points';

  u.points -= amt;
  u.history.push({points:amt,status:'Pending'});

  $('withdrawMsg').textContent = 'Withdrawal pending admin approval';

  save(); updateUI();
}

// ===== HISTORY =====
function loadHistory(){
  const u = users[currentUser];
  const box = $('historyBox');
  if(!box || !u) return;

  box.innerHTML='';

  if(!Array.isArray(u.history)) u.history=[];

  u.history.forEach(h=>{
    box.innerHTML += `<div>${h.points} pts - ${h.status}</div>`;
  });
}

// ===== ADMIN =====
function loadAdmin(){
  const box = $('adminUsers');
  if(!box) return;

  box.innerHTML='';

  for(let username in users){
    const u = users[username];

    box.innerHTML += `
    <div class="admin-box">
      <strong>${username}</strong><br>
      Points: ${u.points} | Energy: ${u.energy}<br>
      <input placeholder="Add Energy" id="energy_${username}">
      <button onclick="addEnergy('${username}')">Add Energy</button>
      <h4>Withdraw Requests</h4>
      ${u.history.map((h,i)=> h.status==='Pending' ?
        `<div>${h.points} pts 
          <button onclick="approveWithdraw('${username}',${i})">Approve</button>
        </div>`:'' ).join('')}
    </div>
    `;
  }
}

function addEnergy(username){
  const amt = parseInt($('energy_'+username)?.value);
  if(!amt) return;
  users[username].energy += amt;
  save(); loadAdmin();
}

function approveWithdraw(username,index){
  const request = users[username].history[index];
  if(!request) return;

  request.status = 'Approved';
  const php = request.points / POINT_RATE;
  users[username].balance += php;

  save(); loadAdmin();
}
</script>
