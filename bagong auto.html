<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chick Miner - Earn Game</title>

<!-- PWA META -->
<meta name="theme-color" content="#4fc3f7">
<link rel="manifest" href="manifest.json">

<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    background: linear-gradient(#4fc3f7, #81c784);
    color:#fff;
  }
  .container { max-width:420px; margin:auto; padding:15px; }
  .card {
    background: rgba(0,0,0,0.65);
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
  }
  input, button {
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    font-size:15px;
  }
  button {
    background:#ffd54f;
    font-weight:bold;
    cursor:pointer;
  }
  button:disabled { background:#777; }

  .install-btn {
    background:#00e5ff;
    color:#000;
  }

  /* CHARACTER */
  .character-box { text-align:center; }
  .character { font-size:60px; display:inline-block; }
  .digging { animation: dig 0.5s infinite alternate; }
  @keyframes dig { from { transform: translateY(0); } to { transform: translateY(8px); } }
  .tired { animation: tiredBlink 1s infinite; opacity:0.5; }
  @keyframes tiredBlink { 0%,100% { opacity:0.5; } 50% { opacity:0.2; } }

  .energy-bar {
    height:22px;
    background:#222;
    border-radius:12px;
    overflow:hidden;
    margin-top:5px;
  }
  .energy-fill {
    height:100%;
    background: linear-gradient(to right, #00e676, #69f0ae);
    width:0%;
    transition: width 0.4s ease;
  }

  .status { text-align:center; margin-top:5px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="container">

  <!-- INSTALL APP -->
  <div class="card">
    <h3>📲 Install App</h3>
    <button id="installBtn" class="install-btn hidden">Install Chick Miner</button>
  </div>

  <!-- LOGIN -->
  <div id="loginCard" class="card">
    <h2>🎮 Game Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <div class="card">
      <div class="character-box">
        <div id="character" class="character">🐥⛏️</div>
        <div id="stateText" class="status">Digging...</div>
      </div>

      <h3>Player: <span id="userDisplay"></span></h3>
      <p>💰 Points: <b id="points">0</b></p>

      <div class="energy-bar"><div id="energyFill" class="energy-fill"></div></div>
      <p class="status">⚡ Energy: <span id="energyText">0</span>/100</p>
    </div>

    <div class="card">
      <h3>💰 Feed Energy</h3>
      <button onclick="deposit()">Feed Chick (+100 Energy)</button>
    </div>

    <div class="card">
      <h3>🎮 Tasks</h3>
      <button id="adBtn" onclick="watchAd()">📺 Watch Ad (+50)</button>
      <button id="gameBtn" onclick="playGame()">🕹️ Play Game (+30)</button>
    </div>

    <div class="card">
      <h3>🎁 Treasure Chest</h3>
      <button onclick="openChest()">Open Chest</button>
      <p id="chestMsg"></p>
    </div>

    <div class="card">
      <h3>💸 Withdraw</h3>
      <input id="withdrawAmount" type="number" placeholder="Enter points">
      <button onclick="withdraw()">Withdraw</button>
      <p id="withdrawMsg"></p>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
let currentUser = null;
let deferredPrompt;

// PWA INSTALL
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
});

installBtn.onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
  installBtn.classList.add('hidden');
};

// STORAGE
function getUsers(){ return JSON.parse(localStorage.getItem("users")||"{}"); }
function saveUsers(u){ localStorage.setItem("users", JSON.stringify(u)); }

function register(){
  if(!username.value||!password.value) return alert("Enter details");
  let users=getUsers();
  if(users[username.value]) return alert("User exists");
  users[username.value]={password:password.value,points:0,energy:100};
  saveUsers(users);
  alert("Registered!");
}

function login(){
  let users=getUsers();
  if(!users[username.value]||users[username.value].password!==password.value)
    return alert("Invalid login");
  currentUser=username.value;
  localStorage.setItem("session",currentUser);
  showApp();
}

function logout(){ localStorage.removeItem("session"); location.reload(); }

function showApp(){
  loginCard.classList.add("hidden");
  app.classList.remove("hidden");
  let data=getUsers()[currentUser];

  userDisplay.textContent=currentUser;
  points.textContent=data.points;
  energyText.textContent=data.energy;
  energyFill.style.width=data.energy+"%";

  updateCharacter(data.energy);
  adBtn.disabled=data.energy<=0;
  gameBtn.disabled=data.energy<=0;
}

function updateCharacter(energy){
  character.classList.remove("digging","tired");
  if(energy<=0){
    character.textContent="🐥💤";
    character.classList.add("tired");
    stateText.textContent="Tired... feed me!";
  }else{
    character.textContent="🐥⛏️";
    character.classList.add("digging");
    stateText.textContent="Digging for rewards";
  }
}

function deposit(){
  let users=getUsers();
  users[currentUser].energy=100;
  saveUsers(users);
  showApp();
}

function watchAd(){
  let users=getUsers();
  let u=users[currentUser];
  if(u.energy<=0) return;
  u.points+=50; u.energy-=10;
  saveUsers(users);
  showApp();
}

function playGame(){
  let users=getUsers();
  let u=users[currentUser];
  if(u.energy<=0) return;
  u.points+=30; u.energy-=15;
  saveUsers(users);
  showApp();
}

function openChest(){
  let reward=Math.floor(Math.random()*100)+20;
  let users=getUsers();
  users[currentUser].points+=reward;
  saveUsers(users);
  chestMsg.textContent="You got "+reward+" points!";
  showApp();
}

function withdraw(){
  let amt=parseInt(withdrawAmount.value);
  let users=getUsers();
  if(!amt||amt<=0) return;
  if(amt>users[currentUser].points){ withdrawMsg.textContent="Not enough points"; return; }
  users[currentUser].points-=amt;
  saveUsers(users);
  withdrawMsg.textContent="Withdraw successful";
  showApp();
}

window.onload=()=>{
  let s=localStorage.getItem("session");
  if(s){ currentUser=s; showApp(); }
};
</script>
<!-- Reward Modal (PlayStore-style) -->
<div id="rewardModal" class="reward-modal" style="display:none;">
  <div class="reward-card">
    <div class="reward-header">Your Chick Earned Rewards!</div>
    <div id="rewardList"></div>
    <button class="close-btn" onclick="closeReward()">Close</button>
  </div>
</div>

<style>
.reward-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999;}
.reward-card{width:90%;max-width:380px;background:#7a4b2c;border-radius:20px;padding:20px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.4);font-family:sans-serif;}
.reward-header{font-size:20px;font-weight:bold;text-align:center;margin-bottom:15px;}
.reward-item{background:#9b623c;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.claim-btn{background:#34c759;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-weight:bold;}
.close-btn{width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;background:#555;color:#fff;}
</style>

<script>
function showRewards(rewards){
  const list = document.getElementById('rewardList');
  list.innerHTML='';
  rewards.forEach(r=>{
    const div=document.createElement('div');
    div.className='reward-item';
    div.innerHTML=`<span>${r}</span><button class='claim-btn'>Claim</button>`;
    list.appendChild(div);
  });
  document.getElementById('rewardModal').style.display='flex';
}

function closeReward(){
  document.getElementById('rewardModal').style.display='none';
}

// Example trigger after digging
function onDigReward(){
  showRewards(['Points 40','₱0.28','Points 30','₱0.07']);
}
</script>

</body>
</html>
